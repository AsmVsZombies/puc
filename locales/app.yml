_version: 2

# ── validate_garg_x_range ──────────────────────────────────────────────
garg_x_range_cancelled:
  en: "gargantuars with x ≤ 400 do not throw imps; calculation skipped."
  zh: "x坐标≤400的巨人不会投掷小鬼, 跳过计算."
garg_x_range_modified:
  en: "gargantuars with x ≤ 400 do not throw imps; x = %{min}~%{max} is used instead."
  zh: "x坐标≤400的巨人不会投掷小鬼, 改用%{min}~%{max}计算."

# ── parse_delay ────────────────────────────────────────────────────────
need_hit_row_hit_col:
  en: "Please provide cob hit row and cob hit col."
  zh: "请提供炮落点行、炮落点列"
need_hit_col:
  en: "Please provide cob hit col."
  zh: "请提供炮落点列"
need_hit_row_hit_col_cob_col:
  en: "Please provide cob hit row, cob hit col, and cob tail col."
  zh: "请提供炮落点行、炮落点列、炮尾所在列"
need_hit_col_cob_col:
  en: "Please provide cob hit col and cob tail col."
  zh: "请提供炮落点列、炮尾所在列"
need_cob_col:
  en: "Please provide cob tail col."
  zh: "请提供炮尾所在列"

# ── parse_doom ─────────────────────────────────────────────────────────
need_doom_row_doom_col:
  en: "Please provide doom row and doom col."
  zh: "请提供核所在行、核所在列"
need_doom_row:
  en: "Please provide doom row."
  zh: "请提供核所在列"

# ── parse_find_max_delay ───────────────────────────────────────────────
need_hit_row_hit_col_range:
  en: "Please provide cob hit row and comma-separated cob hit col range."
  zh: "请提供炮落点行、炮落点列范围(逗号分隔)"
need_hit_col_range:
  en: "Please provide comma-separated cob hit col range."
  zh: "请提供炮落点列范围(逗号分隔最小、最大值)"
need_hit_row_hit_col_range_cob_col:
  en: "Please provide cob hit row, comma-separated cob hit col range, and cob tail col."
  zh: "请提供炮落点行、炮落点列范围(逗号分隔)、炮尾所在列"
need_hit_col_range_cob_col:
  en: "Please provide comma-separated cob hit col range and cob tail col."
  zh: "请提供炮落点列范围(逗号分隔最小、最大值)、炮尾所在列"

# ── parse_imp ──────────────────────────────────────────────────────────
need_garg_x_or_imp_x:
  en: "Please provide garg x, or use: imp garg [imp x]."
  zh: "请提供巨人x坐标，或使用 imp garg 小鬼x坐标"
need_imp_x_range:
  en: "Please provide imp x (integer), or two comma-separated integers."
  zh: "请提供小鬼x坐标(整数)，或逗号分隔的两个整数"
imp_x_should_be_integer:
  en: "imp x should be integer"
  zh: "小鬼x坐标应为整数"
imp_x_should_be_in_range:
  en: "should satisfy %{min} ≤ imp x ≤ %{max}"
  zh: "应满足%{min}≤小鬼x坐标≤%{max}"
garg_x_should_be_number:
  en: "garg x should be number"
  zh: "巨人x坐标应为数字"

# ── parse_ice_times / cob_time / delay_time ────────────────────────────
ice_times_should_be_integer:
  en: "ice times should be integer"
  zh: "用冰时机应为整数"
cob_time_should_be_integer:
  en: "cob time should be integer"
  zh: "激活时机应为整数"
cob_time_should_be_non_negative:
  en: "cob time should ≥ 0"
  zh: "激活时机应≥0"
delay_time_should_be_integer:
  en: "delay time should be integer"
  zh: "炮生效延时应为整数"

# ── parse hit row / hit col ────────────────────────────────────────────
hit_row_should_be_integer:
  en: "hit row should be integer"
  zh: "炮落点行应为整数"
hit_row_out_of_range:
  en: "hit row is out of range %{range}"
  zh: "炮落点行超出范围%{range}"
hit_col_should_be_number:
  en: "hit col should be number"
  zh: "炮落点列应为数字"
hit_col_should_be_in_range:
  en: "should satisfy 0 ≤ hit col < 10"
  zh: "应满足0≤炮落点列<10"
hit_col_times_eighty_not_integer:
  en: "current hit col %{col} * 80 is not an integer; using col %{corrected} instead."
  zh: "当前落点列%{col}×80不是整数, 改用%{corrected}列计算."

# ── parse_min_max_hit_col ──────────────────────────────────────────────
need_min_max_hit_col:
  en: "Please provide min and max hit col."
  zh: "请提供炮落点列最小值、最大值"
need_max_hit_col:
  en: "Please provide max hit col."
  zh: "请提供炮落点列最大值"
min_col_should_be_smaller_than_max_col:
  en: "should satisfy min hit col ≤ max hit col"
  zh: "应满足炮落点列最小值≤最大值"

# ── parse_cob_col ──────────────────────────────────────────────────────
cob_col_should_be_integer:
  en: "cob tail col should be integer"
  zh: "炮尾所在列应为整数"
cob_col_should_be_in_range:
  en: "should satisfy 1 ≤ cob tail col ≤ 8"
  zh: "应满足1≤炮尾所在列≤8"

# ── parse_doom_row / doom_col ──────────────────────────────────────────
doom_row_should_be_integer:
  en: "doom row should be integer"
  zh: "核所在行应为整数"
doom_row_out_of_range:
  en: "doom row is out of range %{range}"
  zh: "核所在行超出范围%{range}"
doom_col_should_be_integer:
  en: "doom col should be integer"
  zh: "核所在列应为整数"
doom_col_should_be_in_range:
  en: "should satisfy 1 ≤ doom col ≤ 9"
  zh: "应满足1≤核所在列≤9"

# ── parse_garg_pos ─────────────────────────────────────────────────────
need_garg_rows_x_range_ice_flag:
  en: "Please provide garg row(s), garg x range (optional), and ice mode (u/i, optional)."
