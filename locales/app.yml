  zh: "巨人x坐标最小值应为数字"
max_garg_x_should_be_number:
  en: "max garg x should be number"
  zh: "巨人x坐标最大值应为数字"
min_garg_x_should_be_smaller_than_max_garg_x:
  en: "should satisfy min garg x ≤ max garg x"
  zh: "应满足巨人x坐标最小值≤最大值"
min_garg_x_should_be_larger_than_lower_bound:
